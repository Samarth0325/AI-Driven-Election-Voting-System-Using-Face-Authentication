<!-- Add this to your base template or specific pages -->
<div id="chatbot-container" class="chatbot-container">
    <!-- Chatbot Toggle Button -->
    <button id="chatbot-toggle" class="chatbot-toggle-btn">
        <i class="bi bi-robot"></i>
        <span class="chatbot-notification" id="chatbotNotification" style="display: none;"></span>
    </button>

    <!-- Chatbot Window -->
    <div id="chatbot-window" class="chatbot-window">
        <!-- Chat Header -->
        <div class="chatbot-header">
            <div class="d-flex align-items-center">
                <div class="chatbot-avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div class="ms-3">
                    <h6 class="mb-0">SecureVote Assistant</h6>
                    <small class="text-success">
                        <i class="bi bi-circle-fill"></i> Online
                    </small>
                </div>
            </div>
            <button id="chatbot-close" class="btn btn-sm btn-link text-muted">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <!-- Chat Messages -->
        <div id="chatbot-messages" class="chatbot-messages">
            <!-- Initial bot message -->
            <div class="message bot-message">
                <div class="message-avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div class="message-content">
                    <p>Hello! I'm your SecureVote assistant. I can help you with:</p>
                    <ul>
                        <li>Voting process guidance</li>
                        <li>Face authentication help</li>
                        <li>Technical issues</li>
                        <li>Election information</li>
                    </ul>
                    <p>How can I assist you today?</p>
                    <small class="text-muted">{{ current_time }}</small>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="chatbot-quick-actions">
            <button class="quick-action-btn" onclick="sendQuickQuestion('How does voting work?')">
                <i class="bi bi-question-circle"></i> Voting Process
            </button>
            <button class="quick-action-btn" onclick="sendQuickQuestion('Face authentication not working')">
                <i class="bi bi-camera"></i> Face Auth Help
            </button>
            <button class="quick-action-btn" onclick="sendQuickQuestion('Technical issues')">
                <i class="bi bi-tools"></i> Technical Help
            </button>
        </div>

        <!-- Chat Input -->
        <div class="chatbot-input-container">
            <div class="input-group">
                <input type="text" id="chatbot-input" class="form-control" 
                       placeholder="Type your question here..." 
                       onkeypress="handleChatInput(event)">
                <button class="btn btn-primary" onclick="sendMessage()">
                    <i class="bi bi-send"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Chatbot Styles */
    .chatbot-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
    }

    .chatbot-toggle-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--gradient-primary);
        border: none;
        color: white;
        font-size: 1.5rem;
        box-shadow: var(--shadow-medium);
        transition: all 0.3s ease;
        position: relative;
    }

    .chatbot-toggle-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 25px rgba(67, 97, 238, 0.3);
    }

    .chatbot-notification {
        position: absolute;
        top: -5px;
        right: -5px;
        background: var(--danger-color);
        color: white;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 0.7rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .chatbot-window {
        position: absolute;
        bottom: 70px;
        right: 0;
        width: 380px;
        height: 500px;
        background: white;
        border-radius: 16px;
        box-shadow: var(--shadow-medium);
        display: none;
        flex-direction: column;
        overflow: hidden;
    }

    .chatbot-window.active {
        display: flex;
    }

    .chatbot-header {
        padding: 1rem;
        background: var(--gradient-primary);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chatbot-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
    }

    .chatbot-messages {
        flex: 1;
        padding: 1rem;
        overflow-y: auto;
        background: #f8f9fa;
    }

    .message {
        display: flex;
        margin-bottom: 1rem;
        animation: fadeIn 0.3s ease;
    }

    .bot-message {
        align-items: flex-start;
    }

    .user-message {
        align-items: flex-end;
        flex-direction: row-reverse;
    }

    .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--primary-color);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        margin: 0 0.5rem;
    }

    .user-message .message-avatar {
        background: var(--info-color);
    }

    .message-content {
        max-width: 70%;
        background: white;
        padding: 0.75rem;
        border-radius: 12px;
        box-shadow: var(--shadow-light);
    }

    .user-message .message-content {
        background: var(--primary-color);
        color: white;
    }

    .chatbot-quick-actions {
        padding: 0.75rem;
        background: white;
        border-top: 1px solid #e9ecef;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
    }

    .quick-action-btn {
        padding: 0.5rem 0.75rem;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        font-size: 0.8rem;
        color: var(--dark-color);
        transition: all 0.2s ease;
        white-space: nowrap;
    }

    .quick-action-btn:hover {
        background: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
    }

    .chatbot-input-container {
        padding: 1rem;
        background: white;
        border-top: 1px solid #e9ecef;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 576px) {
        .chatbot-window {
            width: 100vw;
            height: 100vh;
            bottom: 0;
            right: 0;
            border-radius: 0;
        }
        
        .chatbot-container {
            bottom: 10px;
            right: 10px;
        }
    }
</style>

<script>
    // Chatbot functionality
    let isChatOpen = false;

    // Toggle chatbot window
    document.getElementById('chatbot-toggle').addEventListener('click', function() {
        toggleChatbot();
    });

    document.getElementById('chatbot-close').addEventListener('click', function() {
        toggleChatbot();
    });

    function toggleChatbot() {
        const chatbotWindow = document.getElementById('chatbot-window');
        isChatOpen = !isChatOpen;
        
        if (isChatOpen) {
            chatbotWindow.classList.add('active');
            document.getElementById('chatbot-input').focus();
            // Hide notification if any
            document.getElementById('chatbotNotification').style.display = 'none';
        } else {
            chatbotWindow.classList.remove('active');
        }
    }

    // Send message function
    function sendMessage() {
        const input = document.getElementById('chatbot-input');
        const message = input.value.trim();
        
        if (message) {
            addMessage(message, 'user');
            input.value = '';
            
            // Simulate typing indicator
            showTypingIndicator();
            
            // Send to backend
            fetch('/chatbot/message', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                hideTypingIndicator();
                if (data.response) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                }
            })
            .catch(error => {
                hideTypingIndicator();
                addMessage('Network error. Please check your connection.', 'bot');
            });
        }
    }

    // Quick question function
    function sendQuickQuestion(question) {
        document.getElementById('chatbot-input').value = question;
        sendMessage();
    }

    // Handle Enter key
    function handleChatInput(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // Add message to chat
    function addMessage(content, sender) {
        const messagesContainer = document.getElementById('chatbot-messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}-message`;
        
        const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        messageDiv.innerHTML = `
            <div class="message-avatar">
                <i class="bi bi-${sender === 'user' ? 'person' : 'robot'}"></i>
            </div>
            <div class="message-content">
                <p>${content}</p>
                <small class="text-muted">${timestamp}</small>
            </div>
        `;
        
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Typing indicator
    function showTypingIndicator() {
        const messagesContainer = document.getElementById('chatbot-messages');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.id = 'typing-indicator';
        
        typingDiv.innerHTML = `
            <div class="message-avatar">
                <i class="bi bi-robot"></i>
            </div>
            <div class="message-content">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        `;
        
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function hideTypingIndicator() {
        const typingIndicator = document.getElementById('typing-indicator');
        if (typingIndicator) {
            typingIndicator.remove();
        }
    }

    // Auto-open chatbot for first-time users
    document.addEventListener('DOMContentLoaded', function() {
        const hasSeenChatbot = localStorage.getItem('hasSeenChatbot');
        if (!hasSeenChatbot) {
            setTimeout(() => {
                document.getElementById('chatbotNotification').style.display = 'flex';
                document.getElementById('chatbotNotification').textContent = '!';
            }, 5000);
            localStorage.setItem('hasSeenChatbot', 'true');
        }
    });

    // Add typing dots animation CSS
    const style = document.createElement('style');
    style.textContent = `
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6c757d;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    `;
    document.head.appendChild(style);
</script>
